spring.application.name=blog
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/blogdb?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Flavinha0@}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
jwt.secret=${JWT_SECRET:micelio-blog-jwt-secret-key-for-authentication-2024}

aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.region=${AWS_REGION:us-east-1}
aws.bucket-name=${AWS_BUCKET_NAME:}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
